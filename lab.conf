[[labs]]
id = "exmp"
title = "Example Lab"
show_score = true
show_check_messages = true
max_submissions = 10
max_upload_mb = 2
max_xml_output_mb = 20
rate_limit_count = 5
rate_limit_window_seconds = 60
pka_file = "example_lab.pka"
time_limit_minutes = 20
show_missed_points = true

    [[labs.checks]]
    message = "Check hostname MHSRouter"
    points = 1
    device = "Router0"
        [[labs.checks.pass]]
        type = "ConfigMatch"
        source = "running"
        context = "global"
        value = "hostname MHSRouter"

    [[labs.checks]]
    message = "Check enable secret C1sc0R0cks"
    points = 1
    device = "Router0"
        [[labs.checks.pass]]
        type = "Type5Match"
        source = "running"
        context = "global"
        mode = "device"
        password = "C1sc0R0cks"

    [[labs.checks]]
    message = "Check ip address 192.168.1.2 255.255.255..."
    points = 1
    device = "Router0"
        [[labs.checks.pass]]
        type = "ConfigMatch"
        source = "running"
        context = "interface GigabitEthernet0/0/0"
        value = "ip address 192.168.1.2 255.255.255.252"

